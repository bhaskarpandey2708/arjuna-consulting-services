<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Arjuna Strategy Consulting social card</title>
  <desc id="desc">Political consulting, campaign strategy, survey systems, and voter intelligence in India.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1621" />
      <stop offset="50%" stop-color="#112436" />
      <stop offset="100%" stop-color="#1a2d40" />
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#1f4d6e" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#1f4d6e" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="85%" cy="18%" r="38%">
      <stop offset="0%" stop-color="#d18d47" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#d18d47" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glowA)" />
  <rect width="1200" height="630" fill="url(#glowB)" />

  <g opacity="0.18" stroke="#f2d3ab" fill="none">
    <path d="M822 74c106 0 198 84 198 188" stroke-width="1.4" />
    <path d="M786 112c91 0 164 72 164 162" stroke-width="1.2" />
    <path d="M754 146c69 0 125 55 125 124" stroke-width="1" />
    <circle cx="920" cy="266" r="5" fill="#f2d3ab" />
    <circle cx="878" cy="238" r="3.5" fill="#f2d3ab" />
  </g>

  <rect x="54" y="48" width="1092" height="534" rx="28" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" />

  <g transform="translate(92 88)">
    <circle cx="36" cy="36" r="34" fill="#111216" stroke="rgba(255,255,255,0.12)" />
    <path d="M10 50c20 3 10-33 34-45 15-8 29 1 36 16" fill="none" stroke="#efe5d6" stroke-linecap="round" stroke-linejoin="round" stroke-width="6" />
    <path d="M31 38c12-2 26-3 44-2" fill="none" stroke="#efe5d6" stroke-linecap="round" stroke-linejoin="round" stroke-width="5" />
    <path d="M52 12l36 33" fill="none" stroke="#efe5d6" stroke-linecap="round" stroke-linejoin="round" stroke-width="5" />
    <path d="M76 28l12 11-12 5" fill="none" stroke="#efe5d6" stroke-linecap="round" stroke-linejoin="round" stroke-width="4" />
  </g>

  <text x="184" y="134" fill="#f2c286" font-family="'Sora', Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="5">ARJUNA STRATEGY CONSULTING</text>

  <text x="92" y="255" fill="#eef4fb" font-family="'Bodoni Moda', 'Times New Roman', serif" font-size="108" font-weight="700">
    <tspan x="92" dy="0">Political consulting</tspan>
    <tspan x="92" dy="106">for sharper campaigns</tspan>
    <tspan x="92" dy="106">in India.</tspan>
  </text>

  <text x="96" y="452" fill="#bfd0e2" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="29" font-weight="500">
    Campaign strategy, voter intelligence, political survey research, digital outreach,
  </text>
  <text x="96" y="492" fill="#bfd0e2" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="29" font-weight="500">
    war-room systems, and field operations for high-stakes constituencies.
  </text>

  <g transform="translate(760 382)">
    <rect x="0" y="0" width="322" height="156" rx="24" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" />
    <text x="28" y="48" fill="#f2c286" font-family="'Sora', Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="3">CAMPAIGN STACK</text>
    <text x="28" y="86" fill="#eef4fb" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="28" font-weight="700">Strategy</text>
    <text x="156" y="86" fill="#eef4fb" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="28" font-weight="700">Surveys</text>
    <text x="28" y="124" fill="#eef4fb" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="28" font-weight="700">Field Ops</text>
    <text x="190" y="124" fill="#eef4fb" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="28" font-weight="700">Digital</text>
